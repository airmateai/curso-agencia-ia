<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agencia IA en 2026 — Plataforma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --surface: #141417;
    --surface2: #1c1c21;
    --border: #2a2a32;
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.12);
    --accent-dim2: rgba(201,169,110,0.06);
    --white: #f0f0f0;
    --muted: #888;
    --muted2: #555;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.1);
    --red: #f87171;
    --sidebar-w: 260px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--white); min-height: 100vh; }

  /* ── LOGIN ── */
  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; text-align: center; }
  .login-logo { font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); margin-bottom: 32px; }
  .login-box h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 32px; line-height: 1.6; }
  .login-box input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; color: var(--white); font-family: inherit; font-size: 15px; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
  .login-box input:focus { border-color: var(--accent); }
  .btn-login { width: 100%; background: var(--accent); color: #0c0c0e; border: none; border-radius: 10px; padding: 15px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; margin-top: 4px; }
  .btn-login:hover { opacity: 0.88; }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-msg { font-size: 13px; margin-top: 16px; min-height: 20px; }
  .login-msg.error { color: var(--red); }
  .login-msg.success { color: var(--green); }
  .login-note { font-size: 12px; color: var(--muted2); margin-top: 24px; }

  /* ── APP LAYOUT ── */
  #app { display: none; min-height: 100vh; }
  #app.visible { display: flex; }

  /* ── SIDEBAR ── */
  .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; overflow-y: auto; }
  .sidebar-logo { padding: 20px 18px 16px; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-logo button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; line-height: 1; padding: 0; }
  .sidebar-logo button:hover { color: var(--white); }
  .sidebar-progress { padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .progress-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .progress-bar-wrap { background: var(--surface2); border-radius: 4px; height: 5px; overflow: hidden; }
  .progress-bar-fill { background: var(--accent); height: 100%; border-radius: 4px; transition: width 0.4s ease; width: 0%; }
  .progress-pct { font-size: 12px; color: var(--accent); margin-top: 5px; font-weight: 600; }
  .sidebar-nav { flex: 1; padding: 8px 0; }

  /* Nav items */
  .mod-group { margin-bottom: 4px; }
  .mod-toggle { display: flex; align-items: center; gap: 8px; padding: 8px 18px; cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); transition: color 0.15s; user-select: none; }
  .mod-toggle:hover { color: var(--muted); }
  .mod-toggle .mod-arrow { font-size: 10px; transition: transform 0.2s; margin-left: auto; }
  .mod-toggle.open .mod-arrow { transform: rotate(90deg); }
  .mod-lessons { display: none; }
  .mod-lessons.open { display: block; }
  .lesson-item { display: flex; align-items: center; gap: 9px; padding: 8px 18px 8px 26px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; line-height: 1.3; border-left: 2px solid transparent; }
  .lesson-item:hover { background: var(--accent-dim2); color: var(--white); }
  .lesson-item.active { background: var(--accent-dim); color: var(--accent); border-left-color: var(--accent); }
  .lesson-item.completed { color: #5a9a6a; }
  .lesson-item.completed.active { color: var(--accent); }
  .lesson-check { width: 15px; min-width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid var(--muted2); display: flex; align-items: center; justify-content: center; font-size: 8px; flex-shrink: 0; }
  .lesson-check.done { background: var(--green); border-color: var(--green); color: #000; }

  /* Sidebar special items */
  .sidebar-special { padding: 8px 0; border-top: 1px solid var(--border); }
  .special-item { display: flex; align-items: center; gap: 9px; padding: 9px 18px; cursor: pointer; font-size: 13px; color: var(--muted); transition: all 0.15s; }
  .special-item:hover { color: var(--white); background: var(--accent-dim2); }
  .special-item.map-btn { color: var(--accent); }

  .sidebar-user { padding: 14px 18px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .sidebar-user span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: inherit; flex-shrink: 0; }
  .btn-logout:hover { border-color: var(--muted); color: var(--white); }

  /* ── MAIN ── */
  .main { flex: 1; overflow-y: auto; }
  .lesson-view { max-width: 760px; margin: 0 auto; padding: 44px 36px 120px; }

  /* breadcrumb */
  .breadcrumb { font-size: 12px; color: var(--muted); margin-bottom: 24px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .breadcrumb:hover { color: var(--accent); }
  .breadcrumb span { color: var(--muted2); margin: 0 4px; }

  /* lesson header */
  .lesson-header h1 { font-size: 28px; font-weight: 800; line-height: 1.2; margin-bottom: 12px; }
  .lesson-meta { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-bottom: 32px; flex-wrap: wrap; }

  /* video */
  .video-placeholder { width: 100%; display: flex; align-items: center; justify-content: center; background: var(--surface2); border-radius: 12px; margin-bottom: 36px; aspect-ratio: 16/9; color: var(--muted); font-size: 14px; border: 1px dashed var(--border); gap: 8px; }

  /* content */
  .lesson-content { line-height: 1.8; color: #d0d0d0; }
  .lesson-content h2 { font-size: 20px; font-weight: 700; color: var(--white); margin: 32px 0 12px; }
  .lesson-content h3 { font-size: 16px; font-weight: 600; color: var(--white); margin: 24px 0 8px; }
  .lesson-content p { margin-bottom: 16px; }
  .lesson-content ul, .lesson-content ol { padding-left: 24px; margin-bottom: 16px; }
  .lesson-content li { margin-bottom: 8px; }
  .lesson-content strong { color: var(--white); font-weight: 600; }
  .lesson-content pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; overflow-x: auto; font-size: 13px; line-height: 1.6; margin-bottom: 20px; font-family: 'Courier New', monospace; color: #c9d1d9; }
  .lesson-content code { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 12px; font-family: 'Courier New', monospace; color: var(--accent); }
  .lesson-content pre code { background: none; border: none; padding: 0; color: inherit; }
  .callout { background: var(--accent-dim2); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 16px 20px; margin-bottom: 20px; font-size: 14px; line-height: 1.7; }

  /* notas */
  .notes-section { margin-top: 40px; }
  .notes-section h3 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .notes-textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; color: var(--white); font-family: inherit; font-size: 14px; line-height: 1.6; resize: vertical; min-height: 90px; outline: none; transition: border-color 0.2s; }
  .notes-textarea:focus { border-color: var(--accent); }
  .notes-saved { font-size: 12px; color: var(--green); margin-top: 6px; opacity: 0; transition: opacity 0.3s; }
  .notes-saved.show { opacity: 1; }

  /* quiz */
  .quiz-section { margin-top: 48px; border-top: 1px solid var(--border); padding-top: 40px; }
  .quiz-section h2 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .quiz-section > p { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .question-text { font-size: 15px; font-weight: 500; margin-bottom: 16px; line-height: 1.5; }
  .option-btn { display: flex; align-items: center; gap: 10px; width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--white); border-radius: 8px; padding: 12px 16px; font-family: inherit; font-size: 14px; cursor: pointer; text-align: left; margin-bottom: 8px; transition: all 0.15s; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-dim2); }
  .option-btn.correct { border-color: var(--green); background: var(--green-dim); color: var(--green); }
  .option-btn.wrong { border-color: var(--red); background: rgba(248,113,113,0.08); color: var(--red); }
  .option-btn:disabled { cursor: default; }
  .option-letter { width: 22px; min-width: 22px; height: 22px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .question-explanation { display: none; margin-top: 12px; padding: 12px 16px; background: var(--accent-dim2); border-radius: 8px; font-size: 13px; color: #ccc; line-height: 1.6; }
  .question-explanation.show { display: block; }

  /* lesson nav */
  .lesson-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
  .btn-nav { background: var(--surface); border: 1px solid var(--border); color: var(--white); border-radius: 10px; padding: 12px 20px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .btn-nav:hover { border-color: var(--accent); color: var(--accent); }
  .btn-complete { background: var(--accent); border: none; color: #0c0c0e; border-radius: 10px; padding: 13px 28px; font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .btn-complete:hover { opacity: 0.88; }
  .btn-complete.done { background: var(--green); }

  /* ── MODULE MAP ── */
  .map-view { max-width: 900px; margin: 0 auto; padding: 44px 36px 120px; }
  .map-header { margin-bottom: 40px; }
  .map-header h1 { font-size: 32px; font-weight: 900; margin-bottom: 8px; line-height: 1.15; }
  .map-header h1 em { color: var(--accent); font-style: normal; }
  .map-header p { color: var(--muted); font-size: 15px; line-height: 1.6; }

  .map-stats { display: flex; gap: 12px; margin: 28px 0 40px; flex-wrap: wrap; }
  .map-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; flex: 1; min-width: 110px; }
  .map-stat-num { font-size: 26px; font-weight: 900; color: var(--accent); line-height: 1; }
  .map-stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .map-cta { background: var(--accent); color: #0c0c0e; border: none; border-radius: 10px; padding: 14px 28px; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .map-cta:hover { opacity: 0.88; }

  .modules-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-top: 40px; }

  .mod-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: border-color 0.2s, transform 0.15s; cursor: pointer; }
  .mod-card:hover { border-color: rgba(201,169,110,0.4); transform: translateY(-2px); }
  .mod-card.active { border-color: var(--accent); }

  .mod-card-head { padding: 20px 20px 16px; }
  .mod-num { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .mod-card-head h3 { font-size: 15px; font-weight: 700; line-height: 1.3; color: var(--white); margin-bottom: 12px; }
  .mod-progress-bar { background: var(--surface2); border-radius: 3px; height: 4px; overflow: hidden; }
  .mod-progress-fill { background: var(--accent); height: 100%; border-radius: 3px; transition: width 0.4s; }
  .mod-meta { font-size: 11px; color: var(--muted); margin-top: 8px; display: flex; gap: 12px; }

  /* Lessons expanded inside card */
  .mod-lessons-list { border-top: 1px solid var(--border); display: none; }
  .mod-lessons-list.open { display: block; }
  .mod-lesson-row { display: flex; align-items: center; gap: 10px; padding: 11px 20px; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s; border-bottom: 1px solid var(--border); }
  .mod-lesson-row:last-child { border-bottom: none; }
  .mod-lesson-row:hover { background: var(--accent-dim2); color: var(--white); }
  .mod-lesson-row .lcheck { width: 16px; min-width: 16px; height: 16px; border-radius: 50%; border: 1.5px solid var(--muted2); display: flex; align-items: center; justify-content: center; font-size: 8px; flex-shrink: 0; }
  .mod-lesson-row .lcheck.done { background: var(--green); border-color: var(--green); color: #000; }
  .mod-lesson-row span { flex: 1; line-height: 1.4; }

  /* loading / empty */
  .state-loading { text-align: center; padding: 80px 40px; color: var(--muted); }
  .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* WA link */
  .wa-link { display: inline-flex; align-items: center; gap: 8px; background: #25d366; color: #fff; text-decoration: none; border-radius: 10px; padding: 12px 20px; font-size: 14px; font-weight: 600; margin-top: 16px; }
  .wa-link:hover { opacity: 0.9; }

  /* Mobile hamburger */
  .mob-header { display: none; background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 20px; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .mob-header button { background: none; border: 1px solid var(--border); color: var(--white); border-radius: 8px; padding: 7px 12px; font-size: 16px; cursor: pointer; }
  .mob-logo { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }

  /* Mobile sidebar overlay */
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 98; }
  .sidebar-overlay.open { display: block; }

  @media (max-width: 768px) {
    .sidebar { display: none; position: fixed; left: 0; top: 0; bottom: 0; z-index: 99; width: 280px; min-width: 280px; }
    .sidebar.mob-open { display: flex; }
    .mob-header { display: flex; }
    .lesson-view, .map-view { padding: 24px 18px 100px; }
    .modules-grid { grid-template-columns: 1fr; }
    .map-stats { gap: 8px; }
    .map-stat { min-width: 80px; padding: 12px 14px; }
    .map-stat-num { font-size: 22px; }
    .lesson-nav { flex-direction: column; }
    .btn-nav, .btn-complete { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Agencia IA · Fabio Bueno</div>
    <h1>Accede a tu curso</h1>
    <p>Introduce tu email para entrar. Sin contraseña, sin complicaciones.</p>
    <input type="email" id="email-input" placeholder="tu@email.com" autocomplete="email" />
    <button class="btn-login" id="btn-magic">Entrar →</button>
    <div class="login-msg" id="login-msg"></div>
    <p class="login-note">¿No tienes acceso? <a href="https://airmate.es/curso.html" style="color:var(--accent)">Consíguelo aquí →</a></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Mobile header -->
  <div class="mob-header">
    <button onclick="toggleMobSidebar()">☰</button>
    <span class="mob-logo">Agencia IA</span>
    <button onclick="renderMap()">⊞</button>
  </div>

  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="mob-overlay" onclick="toggleMobSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      Agencia IA
      <button onclick="toggleMobSidebar()" title="Cerrar">✕</button>
    </div>
    <div class="sidebar-progress">
      <div class="progress-label">Progreso</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar"></div></div>
      <div class="progress-pct" id="prog-pct">0%</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <div class="state-loading" style="padding:20px"><div class="spinner"></div></div>
    </nav>
    <div class="sidebar-special">
      <div class="special-item map-btn" onclick="renderMap(); toggleMobSidebar();">⊞ Mapa del curso</div>
      <div class="special-item" onclick="renderMentoria(); toggleMobSidebar();">🎯 Agenda mentoría</div>
    </div>
    <div class="sidebar-user">
      <span id="user-email-display"></span>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main" id="main-content">
    <div class="state-loading"><div class="spinner"></div><p style="color:var(--muted);margin-top:12px">Cargando...</p></div>
  </main>
</div>

<script>
const SB_URL = 'https://vjofxmfwdybktpwiuanc.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqb2Z4bWZ3ZHlia3Rwd2l1YW5jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NzU5NDYsImV4cCI6MjA5MDA1MTk0Nn0.ixU-33c0FEkO7F5xjWb3YHkvj_pQuR0gsJETrGA8ZTE';
const SB_SRV = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqb2Z4bWZ3ZHlia3Rwd2l1YW5jIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDQ3NTk0NiwiZXhwIjoyMDkwMDUxOTQ2fQ.08g-CtdJ0BvgE3U4v9JppA_114EN24KBs7iBpUaw9cs';
const MENTOR_EMAIL = 'airmateai@gmail.com';

let currentUser = null, modules = [], lessons = [], progress = new Set(), currentLesson = null, noteTimer = null;

async function sb(table, method='GET', query='', body=null, useService=false) {
  const key = useService ? SB_SRV : SB_KEY;
  const res = await fetch(`${SB_URL}/rest/v1/${table}?${query}`, {
    method,
    headers: { 'apikey': key, 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json', 'Prefer': body && method!=='PATCH' && method!=='DELETE' ? 'return=representation' : 'return=minimal' },
    body: body ? JSON.stringify(body) : null
  });
  if (method === 'GET') return res.json();
  return res;
}

// AUTH
async function sendMagicLink() {
  const email = document.getElementById('email-input').value.trim().toLowerCase();
  const msg = document.getElementById('login-msg');
  const btn = document.getElementById('btn-magic');
  if (!email || !email.includes('@')) { msg.textContent = 'Introduce un email válido.'; msg.className = 'login-msg error'; return; }
  btn.disabled = true; btn.textContent = 'Verificando...'; msg.textContent = '';
  const alumnos = await sb('curso_alumnos', 'GET', `email=eq.${encodeURIComponent(email)}&active=eq.true`);
  if (!Array.isArray(alumnos) || alumnos.length === 0) {
    msg.textContent = 'Este email no tiene acceso. Contacta con Fabio por WhatsApp.';
    msg.className = 'login-msg error'; btn.disabled = false; btn.textContent = 'Entrar →'; return;
  }
  const token = btoa(email + ':' + Date.now());
  localStorage.setItem('curso_session', JSON.stringify({ email, name: alumnos[0].name, token, ts: Date.now() }));
  msg.textContent = '✓ Acceso verificado. Entrando...'; msg.className = 'login-msg success';
  setTimeout(() => initApp(email, alumnos[0].name), 800);
}
document.getElementById('btn-magic').addEventListener('click', sendMagicLink);
document.getElementById('email-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMagicLink(); });
function logout() { localStorage.removeItem('curso_session'); location.reload(); }

// BOOT
async function boot() {
  const sess = localStorage.getItem('curso_session');
  if (sess) {
    try {
      const { email, name, ts } = JSON.parse(sess);
      if (Date.now() - ts < 30 * 24 * 3600 * 1000) {
        const check = await sb('curso_alumnos', 'GET', `email=eq.${encodeURIComponent(email)}&active=eq.true`);
        if (Array.isArray(check) && check.length > 0) { await initApp(email, name || check[0].name); return; }
      }
    } catch(e) {}
    localStorage.removeItem('curso_session');
  }
  document.getElementById('login-screen').style.display = 'flex';
}

async function initApp(email, name) {
  currentUser = { email, name };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('user-email-display').textContent = name || email;
  await loadCourse();
}

// LOAD COURSE
async function loadCourse() {
  const [mods, less, prog] = await Promise.all([
    sb('curso_modulos', 'GET', 'published=eq.true&order=order_num.asc'),
    sb('curso_lecciones', 'GET', 'published=eq.true&order=order_num.asc'),
    sb('curso_progreso', 'GET', `alumno_email=eq.${encodeURIComponent(currentUser.email)}`)
  ]);
  modules = Array.isArray(mods) ? mods : [];
  lessons = Array.isArray(less) ? less : [];
  progress = new Set((Array.isArray(prog) ? prog : []).map(p => p.lesson_id));
  renderSidebar();
  updateProgress();
  renderMap(); // Mostrar mapa siempre al entrar
}

// MOBILE SIDEBAR
function toggleMobSidebar() {
  const sb = document.getElementById('sidebar');
  const overlay = document.getElementById('mob-overlay');
  sb.classList.toggle('mob-open');
  overlay.classList.toggle('open');
}

// SIDEBAR
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  if (!modules.length) { nav.innerHTML = '<div style="padding:16px 18px;color:var(--muted);font-size:13px">Cargando...</div>'; return; }
  let html = '';
  modules.forEach((mod, mi) => {
    const modLessons = lessons.filter(l => l.module_id === mod.id);
    const doneLessons = modLessons.filter(l => progress.has(l.id)).length;
    const isOpen = modLessons.some(l => currentLesson && l.id === currentLesson.id);
    html += `<div class="mod-group">
      <div class="mod-toggle ${isOpen ? 'open' : ''}" onclick="toggleModGroup(this)">
        <span>${esc(mod.title)}</span>
        <span style="color:var(--muted2);font-size:10px;font-weight:400;letter-spacing:0">${doneLessons}/${modLessons.length}</span>
        <span class="mod-arrow">▶</span>
      </div>
      <div class="mod-lessons ${isOpen ? 'open' : ''}">`;
    modLessons.forEach(l => {
      const done = progress.has(l.id);
      const active = currentLesson && currentLesson.id === l.id;
      html += `<div class="lesson-item ${done?'completed':''} ${active?'active':''}" onclick="renderLesson('${l.id}');toggleMobSidebar()">
        <div class="lesson-check ${done?'done':''}">${done?'✓':''}</div>
        <span>${esc(l.title)}</span>
      </div>`;
    });
    html += `</div></div>`;
  });
  if (currentUser.email === MENTOR_EMAIL) {
    html += `<div class="mod-group"><div class="mod-toggle" onclick="toggleModGroup(this)"><span>Admin</span><span class="mod-arrow">▶</span></div>
    <div class="mod-lessons"><div class="lesson-item" onclick="renderAdmin()"><div class="lesson-check">★</div><span>Panel de gestión</span></div></div></div>`;
  }
  nav.innerHTML = html;
}

function toggleModGroup(el) {
  el.classList.toggle('open');
  const lessons = el.nextElementSibling;
  lessons.classList.toggle('open');
}

function updateProgress() {
  const total = lessons.length, done = progress.size;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
}

function toggleCard(el) {
  const list = el.nextElementSibling;
  const isOpen = list.classList.contains('open');
  // Cerrar todos
  document.querySelectorAll('.mod-lessons-list.open').forEach(l => l.classList.remove('open'));
  document.querySelectorAll('.mod-card.active').forEach(c => c.classList.remove('active'));
  if (!isOpen) {
    list.classList.add('open');
    el.closest('.mod-card').classList.add('active');
    el.closest('.mod-card').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── RENDER LESSON ──────────────────────────────────
async function renderLesson(lessonId) {
  const lesson = lessons.find(l => l.id === lessonId);
  if (!lesson) return;
  currentLesson = lesson;
  toggleMobSidebar(); // cerrar sidebar en mobile si estaba abierto (no-op si no)

  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="state-loading"><div class="spinner"></div></div>';
  main.scrollTop = 0;

  const mod = modules.find(m => m.id === lesson.module_id);
  const [questions, nota] = await Promise.all([
    sb('curso_preguntas', 'GET', `lesson_id=eq.${lessonId}&order=order_num.asc`),
    sb('curso_notas', 'GET', `alumno_email=eq.${encodeURIComponent(currentUser.email)}&lesson_id=eq.${lessonId}`)
  ]);
  const notaContent = Array.isArray(nota) && nota.length > 0 ? nota[0].content : '';
  const isDone = progress.has(lessonId);
  const idx = lessons.findIndex(l => l.id === lessonId);
  const prev = idx > 0 ? lessons[idx-1] : null;
  const next = idx < lessons.length-1 ? lessons[idx+1] : null;

  main.innerHTML = `
  <div class="lesson-view">
    <div class="breadcrumb" onclick="renderMap()">← ${mod ? esc(mod.title) : 'Mapa'}</div>
    <div class="lesson-header">
      <h1>${esc(lesson.title)}</h1>
      <div class="lesson-meta">
        ${lesson.duration_min ? `<span>⏱ ${lesson.duration_min} min</span>` : ''}
        ${isDone ? '<span style="color:var(--green)">✓ Completada</span>' : ''}
      </div>
    </div>

    ${lesson.video_url
      ? `<div style="border-radius:12px;overflow:hidden;margin-bottom:36px;aspect-ratio:16/9;background:#000"><iframe src="${esc(lesson.video_url)}" style="width:100%;height:100%;border:none" allowfullscreen></iframe></div>`
      : `<div class="video-placeholder">🎬 <span>Vídeo próximamente</span></div>`}

    <div class="lesson-content">${lesson.content || '<p style="color:var(--muted)">Contenido próximamente.</p>'}</div>

    <div class="notes-section">
      <h3>Tus notas</h3>
      <textarea class="notes-textarea" id="notes-ta" placeholder="Apunta aquí lo que quieras recordar...">${esc(notaContent)}</textarea>
      <div class="notes-saved" id="notes-saved">Guardado ✓</div>
    </div>

    ${Array.isArray(questions) && questions.length > 0 ? renderQuiz(questions) : ''}

    <div class="lesson-nav">
      ${prev ? `<button class="btn-nav" onclick="renderLesson('${prev.id}')">← Anterior</button>` : '<span></span>'}
      <button class="btn-complete ${isDone?'done':''}" id="btn-complete" onclick="toggleComplete('${lessonId}')">
        ${isDone ? '✓ Completada' : 'Marcar como completada'}
      </button>
      ${next ? `<button class="btn-nav" onclick="renderLesson('${next.id}')">Siguiente →</button>` : '<span></span>'}
    </div>
  </div>`;

  document.getElementById('notes-ta').addEventListener('input', function() {
    clearTimeout(noteTimer);
    noteTimer = setTimeout(() => saveNota(lessonId, this.value), 1200);
  });

  renderSidebar();
}

function renderQuiz(questions) {
  let html = `<div class="quiz-section"><h2>Comprueba lo que has aprendido</h2><p>Responde antes de continuar.</p>`;
  questions.forEach((q, qi) => {
    const opts = Array.isArray(q.options) ? q.options : JSON.parse(q.options || '[]');
    html += `<div class="question-card" id="q-${qi}"><div class="question-text">${qi+1}. ${esc(q.question)}</div>`;
    opts.forEach((opt, oi) => {
      html += `<button class="option-btn" onclick="answerQ(${qi},${oi},${q.correct_index},'${esc(q.explanation||'')}')">
        <span class="option-letter">${['A','B','C','D'][oi]}</span>${esc(opt)}</button>`;
    });
    html += `<div class="question-explanation" id="exp-${qi}">${esc(q.explanation||'')}</div></div>`;
  });
  return html + '</div>';
}

function answerQ(qi, sel, correct, explanation) {
  const card = document.getElementById(`q-${qi}`);
  card.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === correct) btn.classList.add('correct');
    else if (i === sel && sel !== correct) btn.classList.add('wrong');
  });
  if (sel !== correct && explanation) {
    const exp = document.getElementById(`exp-${qi}`);
    if (exp) exp.classList.add('show');
  }
}

// PROGRESS
async function toggleComplete(lessonId) {
  const isDone = progress.has(lessonId);
  if (isDone) { await sb('curso_progreso','DELETE',`alumno_email=eq.${encodeURIComponent(currentUser.email)}&lesson_id=eq.${lessonId}`); progress.delete(lessonId); }
  else { await sb('curso_progreso','POST','',{ alumno_email: currentUser.email, lesson_id: lessonId }); progress.add(lessonId); }
  const btn = document.getElementById('btn-complete');
  if (btn) { const done = progress.has(lessonId); btn.textContent = done ? '✓ Completada' : 'Marcar como completada'; btn.className = `btn-complete ${done?'done':''}`; }
  updateProgress();
  renderSidebar();
}

// NOTAS
async function saveNota(lessonId, content) {
  await sb('curso_notas','POST','',{ alumno_email: currentUser.email, lesson_id: lessonId, content, updated_at: new Date().toISOString() });
  const saved = document.getElementById('notes-saved');
  if (saved) { saved.classList.add('show'); setTimeout(() => saved.classList.remove('show'), 1800); }
}

async function solicitarMentoria() {
  const name=document.getElementById('mn').value.trim(), phone=document.getElementById('mp').value.trim(),
    date=document.getElementById('md').value, time=document.getElementById('mh').value,
    topic=document.getElementById('mt').value.trim(), msg=document.getElementById('ment-msg');
  if (!name||!phone||!date||!time||!topic) { msg.textContent='Rellena todos los campos.'; msg.style.color='var(--red)'; return; }
  const btn=document.querySelector('[onclick="solicitarMentoria()"]');
  if (btn) { btn.disabled=true; btn.textContent='Enviando...'; }
  const res = await sb('curso_mentoria_requests','POST','',{ alumno_email:currentUser.email, alumno_name:name, phone, preferred_date:date, preferred_time:time, topic, status:'pending' });
  if (res.status===201||res.status===200) {
    msg.textContent='✓ Enviado. Te escribo en menos de 24h.'; msg.style.color='var(--green)';
    if (btn) { btn.style.background='var(--green)'; btn.textContent='✓ Solicitud enviada'; }
  } else {
    msg.textContent='Error. Escríbeme por WhatsApp.'; msg.style.color='var(--red)';
    if (btn) { btn.disabled=false; btn.textContent='Solicitar sesión →'; }
  }
}

        const waText=encodeURIComponent(`Hola ${s.alumno_name||''}, soy Fabio. Te confirmo la mentoría para el ${s.preferred_date} a las ${s.preferred_time}. Te mando el link ahora. 🎯`);
        return `<div style="${S.row}">
          <div><div style="font-weight:600">${esc(s.alumno_name||s.alumno_email)}</div><div style="color:var(--muted);font-size:11px">${esc(s.alumno_email)} · ${esc(s.phone||'')}</div><div style="font-size:11px;color:var(--accent);margin-top:2px">📅 ${esc(s.preferred_date)} ${esc(s.preferred_time)}</div>${s.topic?`<div style="font-size:11px;color:#aaa;margin-top:2px">${esc(s.topic)}</div>`:''}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:${s.status==='pending'?'var(--accent-dim)':'var(--surface2)'};color:${s.status==='pending'?'var(--accent)':'var(--muted)'}">${s.status==='pending'?'Pendiente':'Confirmada'}</span>
            ${s.status==='pending'?`<a href="https://wa.me/${(s.phone||'').replace(/\D/g,'')}?text=${waText}" target="_blank" onclick="confirmarMentoria('${s.id}')" style="background:#25d366;color:#fff;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;text-decoration:none">WA ↗</a>`:''}
          </div></div>`;}).join(''):'<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">Sin solicitudes.</div>'}
    </div>
    <div style="${S.card};padding:20px;margin-bottom:20px">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:14px">Dar acceso</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input id="new-email" type="email" placeholder="email@alumno.com" style="flex:1;min-width:180px;${S.inp}"/>
        <input id="new-name" type="text" placeholder="Nombre" style="flex:1;min-width:140px;${S.inp}"/>
        <button onclick="addAlumno()" style="background:var(--accent);color:#0c0c0e;border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px">Dar acceso</button>
      </div>
      <div id="admin-msg" style="font-size:12px;margin-top:8px;min-height:16px"></div>
    </div>
    <div style="${S.card};overflow:hidden">
      <div style="padding:13px 18px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)">Alumnos (${Array.isArray(alumnos)?alumnos.length:0})</div>
      ${Array.isArray(alumnos)&&alumnos.length>0?alumnos.map(a=>`<div style="${S.row}">
        <div><div style="font-weight:500">${esc(a.name||a.email)}</div><div style="color:var(--muted);font-size:11px">${esc(a.email)} · ${new Date(a.enrolled_at).toLocaleDateString('es-ES')}</div></div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:${a.active?'var(--green-dim)':'rgba(248,113,113,0.1)'};color:${a.active?'var(--green)':'var(--red)'}">${a.active?'Activo':'Pausado'}</span>
          <button onclick="toggleAlumno('${a.id}',${a.active})" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:inherit">${a.active?'Pausar':'Reactivar'}</button>
        </div></div>`).join(''):'<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">Sin alumnos.</div>'}
    </div>
  </div>`;
}

async function confirmarMentoria(id) { await sb(`curso_mentoria_requests?id=eq.${id}`,'PATCH','',{status:'confirmed'},true); setTimeout(()=>renderAdmin(),500); }
async function addAlumno() {
  const email=document.getElementById('new-email').value.trim().toLowerCase(), name=document.getElementById('new-name').value.trim(), msg=document.getElementById('admin-msg');
  if (!email||!email.includes('@')) { msg.textContent='Email inválido.'; msg.style.color='var(--red)'; return; }
  const res=await sb('curso_alumnos','POST','',{email,name:name||null},true);
  if (res.status===201||res.status===200) { msg.textContent=`✓ ${email} tiene acceso.`; msg.style.color='var(--green)'; document.getElementById('new-email').value=''; document.getElementById('new-name').value=''; setTimeout(()=>renderAdmin(),1200); }
  else if (res.status===409) { msg.textContent='Ya tiene acceso.'; msg.style.color='var(--accent)'; }
  else { msg.textContent='Error.'; msg.style.color='var(--red)'; }
}
async function toggleAlumno(id, current) { await sb(`curso_alumnos?id=eq.${id}`,'PATCH','',{active:!current},true); renderAdmin(); }

function esc(str) { if (!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Cerrar sidebar mobile al hacer click en lección (si estaba abierto)
const _toggleMobSidebar = toggleMobSidebar;
function toggleMobSidebar() {
  const sb = document.getElementById('sidebar');
  const overlay = document.getElementById('mob-overlay');
  if (sb.classList.contains('mob-open')) {
    sb.classList.remove('mob-open');
    overlay.classList.remove('open');
  } else {
    sb.classList.add('mob-open');
    overlay.classList.add('open');
  }
}

boot();
</script>
</body>
</html>
