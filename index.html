<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agencia IA · Fabio Bueno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080809;
  --s1: #0f0f11;
  --s2: #161618;
  --s3: #1e1e22;
  --border: #242428;
  --border2: #2e2e34;
  --gold: #c9a96e;
  --gold2: #e8c98a;
  --gold-dim: rgba(201,169,110,0.1);
  --gold-dim2: rgba(201,169,110,0.05);
  --white: #f2f2f2;
  --gray1: #a0a0a8;
  --gray2: #606068;
  --green: #4ade80;
  --green-dim: rgba(74,222,128,0.08);
  --red: #f87171;
  --sidebar-w: 280px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ── LOGIN ── */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(201,169,110,0.06) 0%,transparent 70%)}
.login-wrap{width:100%;max-width:420px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:48px}
.login-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--gold)}
.login-logo-text{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.login-wrap h1{font-size:32px;font-weight:800;line-height:1.15;margin-bottom:10px}
.login-wrap h1 em{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold)}
.login-wrap p{color:var(--gray1);font-size:14px;line-height:1.7;margin-bottom:36px}
.login-input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:15px 18px;color:var(--white);font-family:'Inter',sans-serif;font-size:15px;margin-bottom:10px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--gold)}
.btn-primary{width:100%;background:var(--gold);color:#080809;border:none;border-radius:12px;padding:16px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.btn-primary:hover{background:var(--gold2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.login-msg{font-size:13px;margin-top:14px;min-height:18px}
.login-msg.error{color:var(--red)}
.login-msg.success{color:var(--green)}
.login-note{font-size:12px;color:var(--gray2);margin-top:28px}
.login-note a{color:var(--gold);text-decoration:none}

/* ── APP ── */
#app{display:none;min-height:100vh}
#app.visible{display:flex}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.sb-head{padding:24px 20px 20px;border-bottom:1px solid var(--border)}
.sb-logo{display:flex;align-items:center;gap:8px;margin-bottom:0}
.sb-logo-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0}
.sb-logo-text{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.sb-logo button{background:none;border:none;color:var(--gray2);cursor:pointer;font-size:16px;margin-left:auto;line-height:1;display:none}
.sb-prog{padding:16px 20px;border-bottom:1px solid var(--border)}
.sb-prog-label{font-size:10px;color:var(--gray2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:600}
.sb-prog-track{background:var(--s3);border-radius:3px;height:3px;overflow:hidden;margin-bottom:6px}
.sb-prog-fill{background:linear-gradient(90deg,var(--gold),var(--gold2));height:100%;border-radius:3px;transition:width .5s ease}
.sb-prog-pct{font-size:12px;color:var(--gold);font-weight:600}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-nav::-webkit-scrollbar{width:0}
.mod-group{border-bottom:1px solid var(--border)}
.mod-toggle{display:flex;align-items:center;gap:8px;padding:12px 20px;cursor:pointer;user-select:none;transition:background .15s}
.mod-toggle:hover{background:var(--gold-dim2)}
.mod-toggle-num{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--gray2);min-width:24px;text-transform:uppercase}
.mod-toggle-title{font-size:12px;font-weight:600;color:var(--gray1);flex:1;line-height:1.3}
.mod-toggle-arrow{font-size:9px;color:var(--gray2);transition:transform .2s;margin-left:auto;flex-shrink:0}
.mod-toggle.open .mod-toggle-arrow{transform:rotate(90deg)}
.mod-toggle.open .mod-toggle-title{color:var(--white)}
.mod-lessons{display:none}
.mod-lessons.open{display:block}
.lesson-item{display:flex;align-items:center;gap:10px;padding:9px 20px 9px 28px;cursor:pointer;font-size:12px;color:var(--gray2);transition:all .15s;line-height:1.4;border-left:2px solid transparent}
.lesson-item:hover{background:var(--gold-dim2);color:var(--gray1)}
.lesson-item.active{background:var(--gold-dim);color:var(--gold);border-left-color:var(--gold)}
.lesson-item.completed{color:#4a8a5a}
.lesson-item.completed.active{color:var(--gold)}
.lcheck{width:14px;min-width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0;transition:all .2s}
.lcheck.done{background:var(--green);border-color:var(--green);color:#000}
.sb-bottom{border-top:1px solid var(--border)}
.sb-special{padding:4px 0}
.sb-item{display:flex;align-items:center;gap:10px;padding:11px 20px;cursor:pointer;font-size:12px;color:var(--gray2);transition:all .15s}
.sb-item:hover{color:var(--white);background:var(--gold-dim2)}
.sb-item.gold{color:var(--gold)}
.sb-user{padding:14px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px}
.sb-user-email{font-size:11px;color:var(--gray2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-logout{background:none;border:1px solid var(--border);color:var(--gray2);border-radius:6px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .15s}
.btn-logout:hover{border-color:var(--gray2);color:var(--white)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── LESSON VIEW ── */
.lesson-view{max-width:800px;margin:0 auto;padding:48px 40px 120px}
.breadcrumb{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--gray2);cursor:pointer;margin-bottom:28px;transition:color .15s;letter-spacing:.02em}
.breadcrumb:hover{color:var(--gold)}
.lesson-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.lesson-view h1{font-size:30px;font-weight:800;line-height:1.2;margin-bottom:14px;letter-spacing:-.02em}
.lesson-meta{display:flex;gap:16px;font-size:12px;color:var(--gray2);margin-bottom:36px;flex-wrap:wrap;align-items:center}
.lesson-meta-tag{display:flex;align-items:center;gap:5px}
.video-wrap{border-radius:16px;overflow:hidden;margin-bottom:40px;aspect-ratio:16/9;background:var(--s1);border:1px solid var(--border)}
.video-wrap video{width:100%;height:100%;display:block}
.video-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--s1);border-radius:16px;margin-bottom:40px;aspect-ratio:16/9;color:var(--gray2);font-size:13px;border:1px dashed var(--border2);gap:10px}
.video-placeholder svg{opacity:.4}
.lesson-body{line-height:1.85;color:#b8b8c0;font-size:15px}
.lesson-body h2{font-size:20px;font-weight:700;color:var(--white);margin:36px 0 14px;letter-spacing:-.01em}
.lesson-body h3{font-size:16px;font-weight:600;color:var(--white);margin:28px 0 10px}
.lesson-body p{margin-bottom:18px}
.lesson-body ul,.lesson-body ol{padding-left:24px;margin-bottom:18px}
.lesson-body li{margin-bottom:8px}
.lesson-body strong{color:var(--white);font-weight:600}
.lesson-body pre{background:var(--s2);border:1px solid var(--border2);border-radius:12px;padding:20px;overflow-x:auto;font-size:13px;line-height:1.6;margin-bottom:20px;font-family:'Courier New',monospace;color:#b0bec5}
.lesson-body code{background:var(--s2);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-size:12px;font-family:'Courier New',monospace;color:var(--gold)}
.lesson-body pre code{background:none;border:none;padding:0;color:inherit}
.callout{background:var(--gold-dim2);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:16px 20px;margin-bottom:24px;font-size:14px;line-height:1.7;color:#c8c8d0}

/* notes */
.notes-wrap{margin-top:48px;padding-top:36px;border-top:1px solid var(--border)}
.notes-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray2);margin-bottom:12px}
.notes-ta{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:16px 18px;color:var(--white);font-family:'Inter',sans-serif;font-size:14px;line-height:1.7;resize:vertical;min-height:88px;outline:none;transition:border-color .2s}
.notes-ta:focus{border-color:var(--gold)}
.notes-saved{font-size:11px;color:var(--green);margin-top:6px;opacity:0;transition:opacity .3s}
.notes-saved.show{opacity:1}

/* quiz */
.quiz-wrap{margin-top:52px;padding-top:40px;border-top:1px solid var(--border)}
.quiz-title{font-size:18px;font-weight:700;margin-bottom:4px}
.quiz-sub{color:var(--gray2);font-size:13px;margin-bottom:28px}
.q-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:14px}
.q-text{font-size:14px;font-weight:500;margin-bottom:16px;line-height:1.6;color:var(--white)}
.opt-btn{display:flex;align-items:center;gap:12px;width:100%;background:var(--s2);border:1px solid var(--border);color:var(--gray1);border-radius:10px;padding:12px 16px;font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;text-align:left;margin-bottom:8px;transition:all .15s}
.opt-btn:hover:not(:disabled){border-color:var(--gold);background:var(--gold-dim2);color:var(--white)}
.opt-btn.correct{border-color:var(--green);background:var(--green-dim);color:var(--green)}
.opt-btn.wrong{border-color:var(--red);background:rgba(248,113,113,0.06);color:var(--red)}
.opt-btn:disabled{cursor:default}
.opt-letter{width:22px;min-width:22px;height:22px;border-radius:50%;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.q-explanation{display:none;margin-top:12px;padding:12px 16px;background:var(--gold-dim2);border-radius:8px;font-size:13px;color:var(--gray1);line-height:1.6;border-left:2px solid var(--gold)}
.q-explanation.show{display:block}

/* lesson nav */
.lesson-nav{display:flex;align-items:center;justify-content:space-between;margin-top:52px;padding-top:28px;border-top:1px solid var(--border);gap:12px;flex-wrap:wrap}
.btn-nav{background:var(--s1);border:1px solid var(--border);color:var(--gray1);border-radius:10px;padding:12px 20px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-nav:hover{border-color:var(--gold);color:var(--gold)}
.btn-complete{background:var(--gold);border:none;color:#080809;border-radius:10px;padding:13px 28px;font-family:'Inter',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.btn-complete:hover{background:var(--gold2)}
.btn-complete.done{background:var(--green);color:#080809}

/* ── MAP ── */
.map-view{max-width:960px;margin:0 auto;padding:52px 40px 120px}
.map-hero{margin-bottom:48px}
.map-kicker{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.map-hero h1{font-size:38px;font-weight:900;line-height:1.1;letter-spacing:-.03em;margin-bottom:12px}
.map-hero h1 em{font-family:'Playfair Display',serif;font-style:italic;color:var(--gold);font-weight:700}
.map-hero p{color:var(--gray1);font-size:15px;line-height:1.7;max-width:520px}
.map-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:36px 0}
.stat-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:20px 18px}
.stat-num{font-size:28px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--gray2);font-weight:500;letter-spacing:.02em}
.map-cta{background:var(--gold);color:#080809;border:none;border-radius:12px;padding:15px 32px;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.02em;margin-bottom:48px}
.map-cta:hover{background:var(--gold2)}
.map-complete{background:var(--green-dim);border:1px solid rgba(74,222,128,0.15);border-radius:12px;padding:16px 20px;font-size:14px;color:var(--green);margin-bottom:48px}
.modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.mod-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .2s;cursor:pointer}
.mod-card:hover{border-color:rgba(201,169,110,0.3);transform:translateY(-2px)}
.mod-card.active{border-color:var(--gold)}
.mod-card-head{padding:22px 22px 18px}
.mod-card-num{font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
.mod-card-head h3{font-size:15px;font-weight:700;line-height:1.3;color:var(--white);margin-bottom:14px}
.mod-prog-track{background:var(--s3);border-radius:2px;height:3px;overflow:hidden;margin-bottom:10px}
.mod-prog-fill{background:linear-gradient(90deg,var(--gold),var(--gold2));height:100%;border-radius:2px;transition:width .4s}
.mod-card-meta{font-size:11px;color:var(--gray2);display:flex;gap:14px;align-items:center}
.mod-card-meta .expand{margin-left:auto;color:var(--gold);font-size:10px;transition:color .15s}
.mod-card:hover .expand{color:var(--gold2)}
.mod-lessons-list{border-top:1px solid var(--border);display:none}
.mod-lessons-list.open{display:block}
.mod-lesson-row{display:flex;align-items:center;gap:10px;padding:12px 22px;font-size:13px;color:var(--gray2);cursor:pointer;transition:all .15s;border-bottom:1px solid var(--border)}
.mod-lesson-row:last-child{border-bottom:none}
.mod-lesson-row:hover{background:var(--gold-dim2);color:var(--white)}
.mod-lesson-row span{flex:1;line-height:1.4}

/* ── MENTORÍA ── */
.mentoria-view{max-width:640px;margin:0 auto;padding:52px 40px 120px}
.mentoria-hero{text-align:center;margin-bottom:40px}
.mentoria-icon{font-size:40px;margin-bottom:16px}
.mentoria-hero h1{font-size:26px;font-weight:800;margin-bottom:8px}
.mentoria-hero p{color:var(--gray1);font-size:14px;line-height:1.7;max-width:400px;margin:0 auto}
.mentoria-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:36px}
.ment-card{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
.ment-card-icon{font-size:20px;margin-bottom:8px}
.ment-card-title{font-size:13px;font-weight:700;margin-bottom:2px}
.ment-card-sub{font-size:11px;color:var(--gray2)}
.form-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:28px}
.form-card h3{font-size:14px;font-weight:700;margin-bottom:20px;color:var(--white)}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--gray2);display:block;margin-bottom:6px}
.form-input{width:100%;background:var(--s2);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--white);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.form-ta{min-height:80px;resize:vertical;line-height:1.6}

/* ── LOADING ── */
.state-loading{text-align:center;padding:80px 40px;color:var(--gray2)}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── ADMIN ── */
.admin-view{max-width:820px;margin:0 auto;padding:48px 40px 120px}
.admin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0 28px}
.admin-stat{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:18px}
.admin-stat-num{font-size:26px;font-weight:900;color:var(--gold);line-height:1;margin-bottom:4px}
.admin-stat-label{font-size:11px;color:var(--gray2)}
.table-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:18px}
.table-head{padding:14px 20px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--gray2)}
.table-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);font-size:13px;gap:12px;flex-wrap:wrap}
.table-row:last-child{border-bottom:none}
.badge{font-size:10px;padding:3px 8px;border-radius:5px;font-weight:600}
.badge-gold{background:var(--gold-dim);color:var(--gold)}
.badge-green{background:var(--green-dim);color:var(--green)}
.badge-red{background:rgba(248,113,113,0.1);color:var(--red)}
.add-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.add-form .form-input{flex:1;min-width:160px}

/* ── MOBILE ── */
.mob-bar{display:none;background:var(--s1);border-bottom:1px solid var(--border);padding:14px 20px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.mob-bar-logo{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.mob-bar button{background:none;border:1px solid var(--border);color:var(--white);border-radius:8px;padding:7px 12px;font-size:14px;cursor:pointer}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:98;backdrop-filter:blur(2px)}
.sidebar-overlay.open{display:block}

@media(max-width:900px){
  .map-stats{grid-template-columns:repeat(2,1fr)}
  .modules-grid{grid-template-columns:1fr}
  .mentoria-cards{grid-template-columns:1fr}
  .admin-grid{grid-template-columns:1fr}
}
@media(max-width:768px){
  .sidebar{display:none;position:fixed;left:0;top:0;bottom:0;z-index:99;width:280px;min-width:280px}
  .sidebar.mob-open{display:flex}
  .sb-logo button{display:block}
  .mob-bar{display:flex}
  .lesson-view,.map-view,.mentoria-view,.admin-view{padding:24px 20px 100px}
  .form-grid-2{grid-template-columns:1fr}
  .lesson-nav{flex-direction:column}
  .btn-nav,.btn-complete{width:100%;text-align:center}
  .map-hero h1{font-size:28px}
  .map-stats{grid-template-columns:repeat(2,1fr)}
  .add-form{flex-direction:column}
  .add-form .form-input{width:100%}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-logo">
      <div class="login-logo-dot"></div>
      <span class="login-logo-text">Airmate · Fabio Bueno</span>
    </div>
    <h1>Tu curso de<br/><em>Agencia IA</em></h1>
    <p>Introduce tu email para acceder. Sin contraseña, sin complicaciones.</p>
    <input class="login-input" type="email" id="email-input" placeholder="tu@email.com" autocomplete="email"/>
    <button class="btn-primary" id="btn-magic">Entrar →</button>
    <div class="login-msg" id="login-msg"></div>
    <p class="login-note">¿No tienes acceso? <a href="#">Consíguelo aquí →</a></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="mob-bar">
    <button onclick="toggleMobSidebar()">☰</button>
    <span class="mob-bar-logo">Agencia IA</span>
    <button onclick="renderMap()">⊞</button>
  </div>

async function sb(table,method='GET',query='',body=null,useService=false){
  const key=useService?SB_SRV:SB_KEY;
  const res=await fetch(`${SB_URL}/rest/v1/${table}?${query}`,{method,headers:{'apikey':key,'Authorization':`Bearer ${key}`,'Content-Type':'application/json','Prefer':body&&method!=='PATCH'&&method!=='DELETE'?'return=representation':'return=minimal'},body:body?JSON.stringify(body):null});
  if(method==='GET')return res.json();
  return res;
}

async function sendMagicLink(){
  const email=document.getElementById('email-input').value.trim().toLowerCase();
  const msg=document.getElementById('login-msg'),btn=document.getElementById('btn-magic');
  if(!email||!email.includes('@')){msg.textContent='Introduce un email válido.';msg.className='login-msg error';return;}
  btn.disabled=true;btn.textContent='Verificando...';msg.textContent='';
  const alumnos=await sb('curso_alumnos','GET',`email=eq.${encodeURIComponent(email)}&active=eq.true`);
  if(!Array.isArray(alumnos)||alumnos.length===0){msg.textContent='Email sin acceso. Contacta con Fabio por WhatsApp.';msg.className='login-msg error';btn.disabled=false;btn.textContent='Entrar →';return;}
  localStorage.setItem('curso_session',JSON.stringify({email,name:alumnos[0].name,ts:Date.now()}));
  msg.textContent='✓ Acceso verificado. Entrando...';msg.className='login-msg success';
  setTimeout(()=>initApp(email,alumnos[0].name),800);
}

async function boot(){
  const sess=localStorage.getItem('curso_session');
  if(sess){
    try{const{email,name,ts}=JSON.parse(sess);
      if(Date.now()-ts<30*24*3600*1000){
        const check=await sb('curso_alumnos','GET',`email=eq.${encodeURIComponent(email)}&active=eq.true`);
        if(Array.isArray(check)&&check.length>0){await initApp(email,name||check[0].name);return;}
      }
    }catch(e){}
    localStorage.removeItem('curso_session');
  }
  document.getElementById('login-screen').style.display='flex';
}

async function initApp(email,name){
  currentUser={email,name};

function toggleMobSidebar(){
  if(window.innerWidth>768)return;
  const s=document.getElementById('sidebar'),o=document.getElementById('mob-overlay');
  s.classList.toggle('mob-open');o.classList.toggle('open');
}

function renderSidebar(){
  const nav=document.getElementById('sidebar-nav');
  if(!modules.length){nav.innerHTML='<div style="padding:16px 20px;color:var(--gray2);font-size:12px">Cargando...</div>';return;}
  let html='';
  modules.forEach((mod,mi)=>{
    const ml=lessons.filter(l=>l.module_id===mod.id);
    const done=ml.filter(l=>progress.has(l.id)).length;
    const isOpen=ml.some(l=>currentLesson&&l.id===currentLesson.id);
    html+=`<div class="mod-group"><div class="mod-toggle ${isOpen?'open':''}" onclick="toggleModGroup(this)">
      <span class="mod-toggle-num">${String(mi+1).padStart(2,'0')}</span>
      <span class="mod-toggle-title">${esc(mod.title)}</span>
      <span style="font-size:9px;color:var(--gray2);margin-right:4px">${done}/${ml.length}</span>
      <span class="mod-toggle-arrow">▶</span>
    </div><div class="mod-lessons ${isOpen?'open':''}">`;
    ml.forEach(l=>{
      const isDone=progress.has(l.id),isActive=currentLesson&&currentLesson.id===l.id;
      html+=`<div class="lesson-item ${isDone?'completed':''} ${isActive?'active':''}" onclick="renderLesson('${l.id}');toggleMobSidebar()">
        <div class="lcheck ${isDone?'done':''}">${isDone?'✓':''}</div>
        <span>${esc(l.title)}</span>
      </div>`;
    });
    html+=`</div></div>`;
  });

    html+=`<div class="mod-group"><div class="mod-toggle" onclick="toggleModGroup(this)">
      <span class="mod-toggle-num">★</span>
      <span class="mod-toggle-title">Admin</span>
      <span class="mod-toggle-arrow">▶</span>
    </div><div class="mod-lessons"><div class="lesson-item" onclick="renderAdmin()"><div class="lcheck"></div><span>Panel de gestión</span></div></div></div>`;
  }
  nav.innerHTML=html;
}

function toggleModGroup(el){
  el.classList.toggle('open');

}

function updateProgress(){
  const total=lessons.length,done=progress.size;
  const pct=total>0?Math.round((done/total)*100):0;
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

  const totalDone=progress.size;
  const firstIncomplete=lessons.find(l=>!progress.has(l.id));
  let cards='';
  modules.forEach((mod,mi)=>{
    const ml=lessons.filter(l=>l.module_id===mod.id);
    const done=ml.filter(l=>progress.has(l.id)).length;
    const pct=ml.length>0?Math.round((done/ml.length)*100):0;
    const allDone=done===ml.length&&ml.length>0;
    const rows=ml.map(l=>{
      const d=progress.has(l.id);
      return `<div class="mod-lesson-row" onclick="renderLesson('${l.id}')">
        <div class="lcheck ${d?'done':''}">${d?'✓':''}</div>
        <span>${esc(l.title)}</span>
        <span style="font-size:10px;color:var(--gray2)">${d?'':'→'}</span>
      </div>`;
    }).join('');
    cards+=`<div class="mod-card ${allDone?'':''}">
      <div class="mod-card-head" onclick="toggleCard(this)">
        <div class="mod-card-num">Módulo ${String(mi+1).padStart(2,'0')}</div>
        <h3>${esc(mod.title)}</h3>
        <div class="mod-prog-track"><div class="mod-prog-fill" style="width:${pct}%"></div></div>
        <div class="mod-card-meta">
          <span>${ml.length} lección${ml.length!==1?'es':''}</span>
          <span>${allDone?'✓ Completado':done>0?`${done}/${ml.length} hechas`:'Sin empezar'}</span>
          <span class="expand">Ver lecciones ▾</span>
        </div>
      </div>
      <div class="mod-lessons-list">${rows}</div>
    </div>`;
  });

  document.getElementById('main-content').innerHTML=`
  <div class="map-view">
    <div class="map-hero">
      <div class="map-kicker">Tu formación</div>
      <h1>${firstName?`Hola, ${esc(firstName)}.`:'Bienvenido.'}<br/><em>Empieza cuando quieras.</em></h1>
      <p>Sigue el orden la primera vez. Después vuelve cuando necesites repasar algo específico.</p>
    </div>
    <div class="map-stats">
      <div class="stat-card"><div class="stat-num">${modules.length}</div><div class="stat-label">Módulos</div></div>
      <div class="stat-card"><div class="stat-num">${lessons.length}</div><div class="stat-label">Lecciones</div></div>
      <div class="stat-card"><div class="stat-num">${totalDone}</div><div class="stat-label">Completadas</div></div>
      <div class="stat-card"><div class="stat-num">${lessons.length>0?Math.round((totalDone/lessons.length)*100):0}%</div><div class="stat-label">Progreso</div></div>
    </div>
    ${firstIncomplete?`<button class="map-cta" onclick="renderLesson('${firstIncomplete.id}')">${totalDone===0?'Empezar el curso →':'Continuar donde lo dejé →'}</button>`:
    `<div class="map-complete">🎉 Has completado todo el curso. Agenda tu mentoría mensual abajo.</div>`}
    <div class="modules-grid">${cards}</div>
  </div>`;
  renderSidebar();
}

function toggleCard(el){
  const list=el.nextElementSibling,isOpen=list.classList.contains('open');
  document.querySelectorAll('.mod-lessons-list.open').forEach(l=>l.classList.remove('open'));
  document.querySelectorAll('.mod-card.active').forEach(c=>c.classList.remove('active'));
  if(!isOpen){list.classList.add('open');el.closest('.mod-card').classList.add('active');el.closest('.mod-card').scrollIntoView({behavior:'smooth',block:'nearest'});}
}

      ${lesson.duration_min?`<span class="lesson-meta-tag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${lesson.duration_min} min</span>`:''}
      ${isDone?'<span style="color:var(--green);display:flex;align-items:center;gap:4px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Completada</span>':''}
    </div>

      ?`<div class="video-wrap"><video controls playsinline preload="metadata"><source src="${esc(lesson.video_url)}" type="video/mp4"></video></div>`

    <div class="lesson-body">${lesson.content||'<p style="color:var(--gray2)">Contenido próximamente.</p>'}</div>

    ${Array.isArray(questions)&&questions.length>0?renderQuiz(questions):''}

    <div class="lesson-nav">
      ${prev?`<button class="btn-nav" onclick="renderLesson('${prev.id}')">← Anterior</button>`:'<span></span>'}
      <button class="btn-complete ${isDone?'done':''}" id="btn-complete" onclick="toggleComplete('${lessonId}')">
        ${isDone?'✓ Completada':'Marcar como completada'}
      </button>
      ${next?`<button class="btn-nav" onclick="renderLesson('${next.id}')">Siguiente →</button>`:'<span></span>'}

function renderQuiz(questions){
  let html=`<div class="quiz-wrap"><div class="quiz-title">Comprueba lo que has aprendido</div><p class="quiz-sub">Responde antes de continuar con la siguiente lección.</p>`;
  questions.forEach((q,qi)=>{
    const opts=Array.isArray(q.options)?q.options:JSON.parse(q.options||'[]');
    html+=`<div class="q-card" id="q-${qi}"><div class="q-text">${qi+1}. ${esc(q.question)}</div>`;
    opts.forEach((opt,oi)=>{
      html+=`<button class="opt-btn" onclick="answerQ(${qi},${oi},${q.correct_index},'${esc(q.explanation||'')}')">
        <span class="opt-letter">${['A','B','C','D'][oi]}</span>${esc(opt)}</button>`;
    });
    html+=`<div class="q-explanation" id="exp-${qi}">${esc(q.explanation||'')}</div></div>`;
  });
  return html+'</div>';
}

function answerQ(qi,sel,correct,explanation){
  const card=document.getElementById(`q-${qi}`);
  card.querySelectorAll('.opt-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===correct)btn.classList.add('correct');
    else if(i===sel&&sel!==correct)btn.classList.add('wrong');
  });
  if(sel!==correct&&explanation){const exp=document.getElementById(`exp-${qi}`);if(exp)exp.classList.add('show');}
}

async function toggleComplete(lessonId){
  const isDone=progress.has(lessonId);
  if(isDone){await sb('curso_progreso','DELETE',`alumno_email=eq.${encodeURIComponent(currentUser.email)}&lesson_id=eq.${lessonId}`);progress.delete(lessonId);}
  else{await sb('curso_progreso','POST','',{alumno_email:currentUser.email,lesson_id:lessonId});progress.add(lessonId);}
  const btn=document.getElementById('btn-complete');
  if(btn){const done=progress.has(lessonId);btn.textContent=done?'✓ Completada':'Marcar como completada';btn.className=`btn-complete ${done?'done':''}`;}
  updateProgress();renderSidebar();
}

}

async function solicitarMentoria(){

    <div class="admin-grid">
      <div class="admin-stat"><div class="admin-stat-num">${totalAlumnos}</div><div class="admin-stat-label">Alumnos activos</div></div>
      <div class="admin-stat"><div class="admin-stat-num" style="color:${pendientes>0?'var(--green)':'var(--gray2)'}">${pendientes}</div><div class="admin-stat-label">Mentorías pendientes</div></div>
      <div class="admin-stat"><div class="admin-stat-num">${totalAlumnos*47}€</div><div class="admin-stat-label">Ingresos totales</div></div>
    </div>
    <div class="table-card" style="margin-bottom:18px">
      <div class="table-head">Dar acceso nuevo</div>
      <div style="padding:16px 20px">
        <div class="add-form">
          <input class="form-input" id="new-email" type="email" placeholder="email@alumno.com" style="flex:2"/>
          <input class="form-input" id="new-name" type="text" placeholder="Nombre" style="flex:1"/>
          <button onclick="addAlumno()" class="btn-primary" style="width:auto;padding:11px 20px;border-radius:10px;font-size:13px">Dar acceso</button>
        </div>
        <div id="admin-msg" style="font-size:12px;margin-top:8px;min-height:16px"></div>
      </div>
    </div>
    <div class="table-card" style="margin-bottom:18px">
      <div class="table-head">Solicitudes de mentoría</div>
      ${Array.isArray(solicitudes)&&solicitudes.length>0?solicitudes.map(s=>{
        const waText=encodeURIComponent(`Hola ${s.alumno_name||''}, soy Fabio. Te confirmo la mentoría para el ${s.preferred_date} a las ${s.preferred_time}. Te mando el link. 🎯`);
        return `<div class="table-row">
          <div>
            <div style="font-weight:600;font-size:14px">${esc(s.alumno_name||s.alumno_email)}</div>
            <div style="color:var(--gray2);font-size:11px;margin-top:2px">${esc(s.alumno_email)} · ${esc(s.phone||'')}</div>
            <div style="font-size:11px;color:var(--gold);margin-top:3px">📅 ${esc(s.preferred_date)} ${esc(s.preferred_time)}</div>
            ${s.topic?`<div style="font-size:11px;color:var(--gray1);margin-top:2px">${esc(s.topic)}</div>`:''}
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="badge ${s.status==='pending'?'badge-gold':'badge-green'}">${s.status==='pending'?'Pendiente':'Confirmada'}</span>
            ${s.status==='pending'?`<a href="https://wa.me/${(s.phone||'').replace(/\D/g,'')}?text=${waText}" target="_blank" onclick="confirmarMentoria('${s.id}')" style="background:#25d366;color:#fff;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:700;text-decoration:none">WA ↗</a>`:''}
          </div>
        </div>`;
      }).join(''):'<div style="padding:24px;text-align:center;color:var(--gray2);font-size:13px">Sin solicitudes.</div>'}
    </div>
    <div class="table-card">
      <div class="table-head">Alumnos (${Array.isArray(alumnos)?alumnos.length:0})</div>
      ${Array.isArray(alumnos)&&alumnos.length>0?alumnos.map(a=>`<div class="table-row">
        <div>
          <div style="font-weight:500;font-size:14px">${esc(a.name||a.email)}</div>
          <div style="color:var(--gray2);font-size:11px;margin-top:2px">${esc(a.email)} · ${new Date(a.enrolled_at).toLocaleDateString('es-ES')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="badge ${a.active?'badge-green':'badge-red'}">${a.active?'Activo':'Pausado'}</span>
          <button onclick="toggleAlumno('${a.id}',${a.active})" style="background:none;border:1px solid var(--border);color:var(--gray2);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s">${a.active?'Pausar':'Reactivar'}</button>
        </div>
      </div>`).join(''):'<div style="padding:24px;text-align:center;color:var(--gray2);font-size:13px">Sin alumnos.</div>'}
    </div>
  </div>`;
}

async function confirmarMentoria(id){await sb(`curso_mentoria_requests?id=eq.${id}`,'PATCH','',{status:'confirmed'},true);setTimeout(()=>renderAdmin(),500);}
async function addAlumno(){
  const email=document.getElementById('new-email').value.trim().toLowerCase(),name=document.getElementById('new-name').value.trim(),msg=document.getElementById('admin-msg');
  if(!email||!email.includes('@')){msg.textContent='Email inválido.';msg.style.color='var(--red)';return;}
  const res=await sb('curso_alumnos','POST','',{email,name:name||null},true);
  if(res.status===201||res.status===200){msg.textContent=`✓ ${email} tiene acceso.`;msg.style.color='var(--green)';document.getElementById('new-email').value='';document.getElementById('new-name').value='';setTimeout(()=>renderAdmin(),1200);}
  else if(res.status===409){msg.textContent='Ya tiene acceso.';msg.style.color='var(--gold)';}
  else{msg.textContent='Error.';msg.style.color='var(--red)';}
}
async function toggleAlumno(id,current){await sb(`curso_alumnos?id=eq.${id}`,'PATCH','',{active:!current},true);renderAdmin();}

function esc(str){if(!str)return '';return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

boot();
</script>
</body>
</html>
